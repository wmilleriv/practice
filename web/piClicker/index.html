<!DOCTYPE html>
<html>
	<head>
		<title>Leibniz Pi Clicker</title>
		<link rel="stylesheet" href="pi.css">
	</head>
	<body>
		<div>
			<h1>Leibniz Pi Clicker</h1>
			<div id="formula">&Sigma;(-1)<sup>n</sup>/(2n+1)</div>
			<h2>Click to add the next term</h2>
			<h3>The current calculated value of pi is <span id="pi">4</span></h3>
			<h3>The most recently added term is <span id="term">4</span></h3>
			<div id="update">Add term</div>
		</div>


		<script src="pi.js"></script>
	</body>
</html>
